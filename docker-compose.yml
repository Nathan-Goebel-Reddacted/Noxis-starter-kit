services:
  postgres:
    image: postgres:16-alpine
    container_name: cardgame_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cardgame}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cardgame}
      POSTGRES_DB: ${POSTGRES_DB:-cardgame}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cardgame}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cardgame_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-cardgame}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-cardgame}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
