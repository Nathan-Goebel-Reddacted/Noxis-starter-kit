services:
  mongo:
    image: mongo:7
    container_name: app_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-app}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-app}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-app}
    ports:
      - '127.0.0.1:${MONGO_PORT:-27017}:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-app}
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD:-app}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  bun:
    profiles: [app]
    build:
      context: .
      dockerfile: apps/Bun/Dockerfile
    container_name: app_bun
    restart: unless-stopped
    environment:
      DATABASE_URL: mongodb://${MONGO_USER:-app}:${MONGO_PASSWORD:-app}@mongo:27017/${MONGO_DB:-app}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-app}@redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      PORT: 3000
    ports:
      - '127.0.0.1:${PORT:-3000}:3000'
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  react:
    profiles: [app]
    build:
      context: .
      dockerfile: apps/React/Dockerfile
      args:
        VITE_WS_URL: ${VITE_WS_URL:-http://localhost:3000}
    container_name: app_react
    restart: unless-stopped
    ports:
      - '127.0.0.1:${WEB_PORT:-8080}:80'
    depends_on:
      - bun

volumes:
  mongo_data:
  redis_data:
