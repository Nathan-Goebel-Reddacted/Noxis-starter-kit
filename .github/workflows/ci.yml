name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install
      - run: bun run typecheck
      - run: bunx eslint .
      - run: bun run format:check
      - run: bun audit

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: app
          MONGO_INITDB_ROOT_PASSWORD: app
          MONGO_INITDB_DATABASE: app_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        command: redis-server --requirepass app
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a app ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: mongodb://app:app@localhost:27017/app_test?authSource=admin
      REDIS_URL: redis://:app@localhost:6379
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install
      - run: bun test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install
      - run: bun run --filter '@app/bun' build
      - run: bun run --filter '@app/react' build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/Bun/Dockerfile
          push: false
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/React/Dockerfile
          push: false
