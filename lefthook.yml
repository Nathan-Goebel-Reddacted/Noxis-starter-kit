commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks protect --staged --redact -q
    merge-conflicts:
      run: bash scripts/check-merge-conflicts.sh
    large-files:
      run: bash scripts/check-large-files.sh
    biome:
      glob: "*.{js,ts,jsx,tsx,json}"
      stage_fixed: true
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
    typecheck:
      glob: "*.{ts,tsx}"
      run: bun run typecheck

pre-push:
  parallel: true
  commands:
    typecheck:
      run: bun run typecheck
    tests:
      run: bun test
    audit:
      run: bunx better-npm-audit audit
