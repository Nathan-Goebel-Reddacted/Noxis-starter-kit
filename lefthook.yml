commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: bash scripts/check-secrets.sh
    merge-conflicts:
      run: bash scripts/check-merge-conflicts.sh
    large-files:
      run: bash scripts/check-large-files.sh
    eslint:
      glob: '*.{js,ts,jsx,tsx}'
      stage_fixed: true
      run: bunx eslint --fix --no-error-on-unmatched-pattern {staged_files}
    prettier:
      glob: '*.{js,ts,jsx,tsx,json,md,yml,yaml}'
      stage_fixed: true
      run: bunx prettier --write --ignore-unknown {staged_files}
    typecheck:
      glob: '*.{ts,tsx}'
      run: bun run typecheck

pre-push:
  parallel: true
  commands:
    typecheck:
      run: bun run typecheck
    tests:
      run: bun test
    audit:
      run: bun audit
